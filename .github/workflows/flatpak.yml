# SPDX-License-Identifier: GPL-3.0-or-later
# Build and validate the Inversée Flatpak on every push and pull request,
# and attach the resulting single-file bundle to a GitHub Release when a
# tag is pushed.

name: Flatpak

on:
  push:
    branches: ['**']
    tags: ['*']
  pull_request:
    branches: ['**']

permissions:
  contents: write   # required to upload assets to a Release on tag push

jobs:
  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    container:
      # The gnome-48 tag was never published; gnome-47 ships the same
      # flatpak-builder. The org.gnome.Platform//48 runtime is pulled
      # from Flathub at build time regardless of the image tag.
      image: bilelmoussaoui/flatpak-github-actions:gnome-47
      options: --privileged

    steps:
      - name: Checkout
        # v5 targets Node.js 24 natively; v4 still ships Node 20
        # metadata and triggers the deprecation warning even when
        # forced onto a newer runtime.
        uses: actions/checkout@v5

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: inversee.flatpak
          manifest-path: build-aux/fr.benjaminbellamy.Inversee.yaml
          cache-key: flatpak-builder-${{ github.sha }}
          run-tests: true

      - name: Dump build logs on failure
        if: failure()
        run: |
          for f in $(find .flatpak-builder/build -name config.log); do
            echo "=========================================================="
            echo "===  $f"
            echo "===  (lines around reliability / conftest / error)"
            echo "=========================================================="
            grep -nE 'conftest|reliab|long long|configure:[0-9]+: (error|result):' "$f" \
              | head -200 || true
            echo
            echo "===  …and the trailing 60 lines of the same file ==="
            tail -60 "$f"
            echo
          done
          echo "=== meson logs ==="
          find .flatpak-builder/build -name 'meson-log.txt' -print -exec cat {} +
          echo "=== build dirs ==="
          ls -la .flatpak-builder/build || true

      - name: Rename bundle for tagged release
        if: startsWith(github.ref, 'refs/tags/')
        run: mv inversee.flatpak inversee-${{ github.ref_name }}.flatpak

      - name: Attach bundle to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: inversee-${{ github.ref_name }}.flatpak
