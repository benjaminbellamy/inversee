# SPDX-License-Identifier: GPL-3.0-or-later
# Build and validate the Inversée Flatpak on every push and pull request,
# and attach the resulting single-file bundle to a GitHub Release when a
# tag is pushed.

name: Flatpak

on:
  push:
    branches: ['**']
    tags: ['*']
  pull_request:
    branches: ['**']

permissions:
  contents: write   # required to upload assets to a Release on tag push

jobs:
  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-48
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: inversee.flatpak
          manifest-path: build-aux/fr.benjaminbellamy.Inversee.yaml
          cache-key: flatpak-builder-${{ github.sha }}
          run-tests: true

      - name: Rename bundle for tagged release
        if: startsWith(github.ref, 'refs/tags/')
        run: mv inversee.flatpak inversee-${{ github.ref_name }}.flatpak

      - name: Attach bundle to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: inversee-${{ github.ref_name }}.flatpak
